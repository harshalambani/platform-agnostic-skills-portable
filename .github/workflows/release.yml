# .github/workflows/release.yml
#
# CI release pipeline for PA Skills Portable.
#
# Trigger: push a tag matching "v*" (e.g. v0.3.0).
# What it does:
#   1. Checks out the repo (with LFS for vendor/ + bundled binaries).
#   2. Installs Python 3.13.
#   3. Runs `python bundling/build.py` with --skip-pull (agents/ is
#      already committed in the repo) to produce the frozen exe,
#      PortableApps wrapper, and release zip.
#   4. Creates a GitHub Release and attaches the zip.
#
# The Launcher Generator is bundled in bundling/launcher-gen/2.2.4/
# so CI no longer needs to download it from portableapps.com.
#
# The build uses --skip-pull because the GitHub runner has no sibling
# platform-agnostic-skills folder. src/agents/ is committed in-tree.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout with LFS (vendor/ + launcher-gen binaries via LFS)
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0     # full history so git-describe finds tags

      - name: Verify LFS files
        run: git lfs pull

      # ------------------------------------------------------------------
      # 2. Python
      # ------------------------------------------------------------------
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ------------------------------------------------------------------
      # 3. Extract version from tag
      # ------------------------------------------------------------------
      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Tag: $tag  Version: $version"
          echo "VERSION=$version" >> $env:GITHUB_ENV

      # ------------------------------------------------------------------
      # 4. Build (launcher generator found automatically via bundled copy)
      # ------------------------------------------------------------------
      - name: Run build.py
        shell: pwsh
        run: |
          python bundling/build.py `
            --version "$env:VERSION" `
            --skip-pull `
            --allow-dirty

      # ------------------------------------------------------------------
      # 5. Upload zip as build artifact (useful for debugging)
      # ------------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PASkillsPortable_${{ env.VERSION }}
          path: dist/PASkillsPortable_*.zip
          if-no-files-found: error

      # ------------------------------------------------------------------
      # 6. Create GitHub Release and attach the zip
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PA Skills Portable ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/PASkillsPortable_*.zip
          generate_release_notes: true
          body: |
            ## PA Skills Portable ${{ env.VERSION }}

            Download `PASkillsPortable_${{ env.VERSION }}.zip`, extract it,
            and double-click `PASkillsPortable.exe` to launch.

            Built from commit ${{ github.sha }}.
