# .github/workflows/release.yml
#
# CI release pipeline for PA Skills Portable.
#
# Trigger: push a tag matching "v*" (e.g. v0.3.0).
# What it does:
#   1. Checks out the repo (with LFS for vendor/ + bundled binaries).
#   2. Installs Python 3.13.
#   3. Runs `python bundling/build.py` with --skip-pull (agents/ is
#      already committed in the repo) to produce the frozen exe,
#      PortableApps wrapper, release zip, and the installable .paf.exe.
#   4. Creates a GitHub Release and attaches both the .paf.exe installer
#      and the .zip.
#
# The Launcher Generator (bundling/launcher-gen/2.2.4/) and the
# PortableApps.com Installer (bundling/installer/3.9.16/) are both bundled
# in-repo, so CI never needs to download tooling from portableapps.com.
#
# The build pulls agents/ from the published upstream repo
# (github.com/harshalambani/platform-agnostic-skills) via git clone.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout with LFS (vendor/ + launcher-gen binaries via LFS)
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0     # full history so git-describe finds tags

      - name: Verify LFS files
        run: git lfs pull

      # ------------------------------------------------------------------
      # 2. Python
      # ------------------------------------------------------------------
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # ------------------------------------------------------------------
      # 3. Extract version from tag
      # ------------------------------------------------------------------
      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Tag: $tag  Version: $version"
          echo "VERSION=$version" >> $env:GITHUB_ENV

      # ------------------------------------------------------------------
      # 4. Build (launcher generator found automatically via bundled copy)
      # ------------------------------------------------------------------
      - name: Run build.py
        shell: pwsh
        run: |
          python bundling/build.py `
            --version "$env:VERSION" `
            --allow-dirty `
            --skip-pull

      # ------------------------------------------------------------------
      # 4b. Frozen-build smoke test (Phase 6, E4)
      #     Launch pa_skills.exe, wait for the port file, GET the root
      #     URL, verify a 200 response, then kill the process.
      # ------------------------------------------------------------------
      - name: Smoke-test frozen build
        shell: pwsh
        run: |
          $exe = "staging\App\PASkills\pa_skills.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Frozen exe not found at $exe"
            exit 1
          }

          # Launch in background; suppress browser auto-open.
          # Redirect stdout/stderr so we can diagnose startup crashes.
          $env:PA_SKILLS_NO_BROWSER = "1"
          $env:PA_SKILLS_PORT_FILE = "$PWD\smoke_port.json"
          $stdoutLog = "$PWD\smoke_stdout.log"
          $stderrLog = "$PWD\smoke_stderr.log"
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog

          # Wait up to 60s for the port file to appear.
          $deadline = (Get-Date).AddSeconds(60)
          while (-not (Test-Path $env:PA_SKILLS_PORT_FILE)) {
            if ((Get-Date) -gt $deadline) {
              Write-Host "=== STDOUT (last 50 lines) ==="
              if (Test-Path $stdoutLog) { Get-Content $stdoutLog -Tail 50 }
              Write-Host "=== STDERR (last 50 lines) ==="
              if (Test-Path $stderrLog) { Get-Content $stderrLog -Tail 50 }
              # Check if process already exited (crashed)
              if ($proc.HasExited) {
                Write-Host "Process exited with code: $($proc.ExitCode)"
              }
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              Write-Error "Timed out waiting for port file."
              exit 1
            }
            Start-Sleep -Milliseconds 500
          }

          $portInfo = Get-Content $env:PA_SKILLS_PORT_FILE | ConvertFrom-Json
          $url = $portInfo.url
          Write-Host "Frozen build listening at $url"

          # Give Gradio a moment to fully bind after writing the port file.
          Start-Sleep -Seconds 3

          # Hit the root URL — Gradio returns HTML with status 200.
          try {
            $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
            if ($resp.StatusCode -ne 200) {
              Write-Error "Expected 200, got $($resp.StatusCode)"
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              exit 1
            }
            Write-Host "Smoke test PASSED — got HTTP $($resp.StatusCode) from $url"
          } catch {
            Write-Error "HTTP request failed: $_"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            exit 1
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      # ------------------------------------------------------------------
      # 5. Upload zip as build artifact (useful for debugging)
      # ------------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: PASkillsPortable_${{ env.VERSION }}
          path: |
            dist/PASkillsPortable_*.paf.exe
            dist/PASkillsPortable_*.zip
          if-no-files-found: error

      # ------------------------------------------------------------------
      # 6. Create GitHub Release and attach the zip
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: PA Skills Portable ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/PASkillsPortable_*.paf.exe
            dist/PASkillsPortable_*.zip
          generate_release_notes: true
          body: |
            ## PA Skills Portable ${{ env.VERSION }}

            **Recommended:** download `PASkillsPortable_${{ env.VERSION }}.paf.exe`
            and run it — the PortableApps.com installer sets the app up in the
            location you choose, then launch it with `PASkillsPortable.exe`.

            **Alternative (no installer):** download
            `PASkillsPortable_${{ env.VERSION }}.zip`, extract it anywhere, and
            double-click `PASkillsPortable.exe`.

            ### Windows SmartScreen / Smart App Control

            This build is not code-signed yet, so Windows 11 may warn or block
            it on first run. On **SmartScreen** ("Windows protected your PC"),
            click **More info -> Run anyway** (or run
            `Unblock-File .\PASkillsPortable_${{ env.VERSION }}.paf.exe` in
            PowerShell first). **Smart App Control** is stricter and has no
            per-app override — if it blocks the app you'll need a PC without it,
            or to turn it off in Windows Security. This is expected for an
            unsigned build; the source and build are public in this repo.

            Built from commit ${{ github.sha }}.
