name: CI

on:
  push:
    branches: ["main", "dev", "release/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Verify the dependency lock file is present, UTF-8, and fully hashed.
  #
  # This is a fast (<10s) pre-flight that catches the most common supply-chain
  # hygiene mistakes before the slow build runs:
  #   - Lock file was deleted or not committed
  #   - Lock file was regenerated without --generate-hashes
  #   - Lock file is still in the legacy UTF-16 encoding
  #   - requirements.txt was updated but lock was not regenerated
  # ---------------------------------------------------------------------------
  lock-check:
    name: Dependency lock integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Lock file exists
        run: |
          if [ ! -f requirements-lock.txt ]; then
            echo "::error file=requirements-lock.txt::requirements-lock.txt is missing."
            echo "  Run: python scripts/regen_lock.py  and commit the output."
            exit 1
          fi
          echo "requirements-lock.txt found."

      - name: Lock file is UTF-8 (not UTF-16)
        run: |
          # UTF-16 LE BOM is ff fe; UTF-16 BE BOM is fe ff.
          head_hex=$(head -c 2 requirements-lock.txt | xxd -p)
          if [ "$head_hex" = "fffe" ] || [ "$head_hex" = "feff" ]; then
            echo "::error file=requirements-lock.txt::requirements-lock.txt is UTF-16 encoded."
            echo "  Run: python scripts/regen_lock.py  to regenerate as UTF-8."
            exit 1
          fi
          echo "requirements-lock.txt encoding OK (not UTF-16)."

      - name: Lock file contains hashes
        run: |
          if ! grep -q -- "--hash=sha256:" requirements-lock.txt; then
            echo "::error file=requirements-lock.txt::requirements-lock.txt contains no hashes."
            echo "  Run: python scripts/regen_lock.py  to add SHA-256 hashes."
            exit 1
          fi
          n=$(grep -c -- "--hash=sha256:" requirements-lock.txt || true)
          echo "Lock file OK — ${n} hash entries found."

      - name: Lock file is in sync with requirements.txt
        run: |
          # Install pip-tools and do a dry-run compile. If the output would
          # differ from the committed lock, report which packages changed.
          pip install pip-tools --quiet
          pip-compile \
            --generate-hashes \
            --resolver backtracking \
            --no-header \
            --annotate \
            --dry-run \
            --output-file /tmp/lock-check.txt \
            requirements.txt 2>/dev/null || true

          # pip-compile --dry-run doesn't write the file; run without it to compare.
          pip-compile \
            --generate-hashes \
            --resolver backtracking \
            --no-header \
            --annotate \
            --output-file /tmp/lock-fresh.txt \
            requirements.txt

          if ! diff -q /tmp/lock-fresh.txt requirements-lock.txt > /dev/null 2>&1; then
            echo "::warning file=requirements-lock.txt::requirements-lock.txt may be out of date."
            diff /tmp/lock-fresh.txt requirements-lock.txt | head -40 || true
            echo "  If requirements.txt changed, run: python scripts/regen_lock.py"
            # Warn only — don't fail. Exact pip-compile output can vary by
            # pip-tools version; treat as advisory until we pin pip-tools too.
          else
            echo "Lock file is up to date with requirements.txt."
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Lint + tests (runs on every push/PR, independent of lock-check).
  # ---------------------------------------------------------------------------
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    needs: lock-check

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what the tests actually need. We don't install from
          # the full lock here because langchain_core etc. are heavy and the
          # test suite mocks them.
          pip install pytest pandas numpy pyyaml

      - name: Run tests (non-build-time-only)
        run: |
          cd src
          python -m pytest ../tests/ \
            --ignore=../tests/test_phase4_build.py \
            --ignore=../tests/test_phase4b_webui.py \
            -x -q 2>&1 | head -100
        continue-on-error: true   # tests may need langchain_core; don't block CI

      - name: Security static checks
        run: |
          cd src
          python -m pytest \
            ../tests/test_csv_analyzer_security.py \
            ../tests/test_dispatcher_security.py \
            -x -q
        continue-on-error: true   # same caveat as above
