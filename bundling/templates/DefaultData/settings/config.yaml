# PA Skills Portable — default settings.
# Copied to Data\settings\config.yaml on first launch by the PortableApps Launcher.
# Subsequent runs read and write this file directly; PA Launcher does not overwrite it.
#
# SECURITY: api_key values are stored UNENCRYPTED in this file.
# Keep this file private; do not share the Data\ folder.
# Full keyring/DPAPI encryption is tracked as a future improvement (MP-04).

active_endpoint: local_ollama

# ── Default model (single knob) ─────────────────────────────────────────────
# This is THE default LLM for every endpoint below. Change it here once and it
# applies everywhere. An endpoint can still override it by setting its own
# `default_model:` line. Use the exact tag your server exposes (e.g. the name
# from `ollama list`).
default_model: gemma4:e2b

endpoints:
  local_ollama:
    provider: ollama
    base_url: http://localhost:11434
    temperature: 0.0
    # inherits default_model: gemma4:e2b

  lan_ollama:
    provider: ollama
    base_url: http://192.168.1.50:11434
    temperature: 0.0
    # inherits default_model: gemma4:e2b

  openai_compatible:
    provider: openai_compatible
    base_url: http://localhost:8000/v1
    api_key: not-needed
    default_model: gemma-4   # override example — remove to inherit the default
    temperature: 0.0

# Where skill outputs land (relative to %PAL:DataDir% in frozen builds,
# relative to the cwd in source mode).
output_dir: ./outputs

# Theme override (Phase 3 will surface a toggle; Phase 1 always uses 'dark').
theme: dark
