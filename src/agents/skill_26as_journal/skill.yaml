# skill.yaml — 26AS TDS Journal skill manifest
# Read by the skill registry (agents/registry.py) at startup.

name: "26AS Journal"
display_name: "Journal"
description: >
  Create GnuCash TDS/TCS journal entries from a 26AS Convert workbook and your
  .gnucash file. One balanced transaction per Part I deductor (Interest /
  Dividend / Partnership) and per Part VI collector (TCS), with credit accounts
  matched to your chart of accounts and unmatched ones routed to Suspense for
  review.
category: "26as"
version: "1.0.0"

mode: "agent"
entry_point: "agent:run"

inputs:
  - name: "xlsx_path"
    type: "output_file"
    label: "26AS workbook (Convert output)"
    match: "*-26AS.xlsx"
    file_types: [".xlsx"]
    required: true
  - name: "gnucash_path"
    type: "file"
    label: "GnuCash file"
    file_types: [".gnucash"]
    required: true

run_args:
  xlsx_path: "{inputs.xlsx_path}"
  gnucash_path: "{inputs.gnucash_path}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

output:
  extension: ".csv"
  suffix: "tds-journals"
  download_label: "Download Journal CSV"

requires:
  native_binaries: []
  external_tools: []

help:
  overview: >
    Builds GnuCash journal entries from a 26AS workbook plus your GnuCash book.
    It reads Part I (TDS) and Part VI (TCS), matches each deductor to one of
    your accounts (deterministic fuzzy match first, LLM fallback for the hard
    cases), and writes a balanced journal CSV ready to import. TCS entries debit
    your TCS account and credit Drawings — only the tax moves, since the spend
    it was collected on is already in your books.
  when_to_use: >
    Use this after "26AS Convert", when you want the TDS and TCS recorded in
    GnuCash as journal entries instead of typing each one by hand. Getting TCS
    into the book matters: it is a credit against your tax, and if it never
    reaches the books your return understates the refund due.
  inputs:
    - name: "xlsx_path"
      tooltip: "The 26AS workbook produced by 26AS Convert — pick it from the list of prior outputs."
      accepts: "Excel (.xlsx) matching *-26AS.xlsx."
      gotchas: "Run 26AS Convert first; the picker only shows workbooks from earlier runs."
    - name: "gnucash_path"
      tooltip: "Your GnuCash book — used only to read account names for matching."
      accepts: "GnuCash file (.gnucash)."
      gotchas: "Close the book in GnuCash before running so the file is not locked. It is never modified."
  steps:
    - "Pick the 26AS workbook from the dropdown of prior outputs."
    - "Select your .gnucash book (make sure GnuCash has it closed)."
    - "Click Run; review any deductors flagged as unmatched."
    - "Import the CSV into GnuCash: File > Import > Import Transactions from CSV."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-tds-journals.csv"
        tooltip: >
          One balanced journal transaction per TDS entry (every transaction's
          amounts sum to zero), debiting the TDS receivable / asset account and
          crediting the income account, ready for GnuCash CSV import.
      - name: "YYYY-MM-DD-HHMMSS-<input>-tds-journals-partI.csv"
        tooltip: >
          Only written when the 26AS has 15G/15H (Part II) entries: the same
          journal with every 15G/15H transaction dropped whole. Import this
          instead of the full journal if you post 15G/15H entries by hand in
          GnuCash yourself, so the Interest-on-FD reclassification is not
          double-booked. Regenerated on every save from the Journal Review
          screen, so it can never go stale.
  tips: >
    Entries whose deductor could not be matched to an account are flagged so you
    can fix the account name in your book (or add the missing account) and re-run.
  troubleshooting:
    - problem: "Run errors mentioning the endpoint / model."
      fix: "This skill uses an LLM for fallback matching. Start Ollama (or set an endpoint in Settings)."
    - problem: "A deductor was assigned the wrong account."
      fix: "Rename/add the account in GnuCash so its name is closer to the deductor, then re-run."
