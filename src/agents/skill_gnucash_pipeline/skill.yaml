# skill.yaml — GnuCash Import Pipeline manifest

name: "gnucash_pipeline"
display_name: "Import Statement"
description: >
  End-to-end import pipeline: upload a raw bank statement and your GnuCash book,
  get back a GnuCash-ready mapped CSV in one click. No intermediate steps.
  Supports ICICI (XLS), Bank of Baroda (PDF), HSBC (PDF), HDFC (PDF incl.
  password-protected, XLS/XLSX, CSV — all deterministic, no LLM), Kotak
  (PDF), and any other bank via CSV upload with LLM-assisted column
  normalisation.
  Chain: bank extraction → canonical format → account mapping.
category: "gnucash"
version: "1.2.0"

mode: "agent"
entry_point: "agent:run"

inputs:
  - name: "bank"
    type: "select"
    label: "Bank"
    required: true
    options:
      - "ICICI"
      - "Bank of Baroda"
      - "HSBC"
      - "HDFC"
      - "Kotak"
      - "Other Bank (CSV)"

  - name: "statement_files"
    type: "files"
    label: "Statement file(s) — XLS for ICICI; PDF(s) for BoB / HSBC / Kotak; CSV or XLS/XLSX for HDFC / Other"
    file_types: [".xls", ".xlsx", ".pdf", ".csv"]
    required: true

  - name: "gnucash_file"
    type: "file"
    label: "GnuCash book (.gnucash) — must be closed in GnuCash"
    file_types: [".gnucash"]
    required: true

  - name: "pdf_password"
    type: "password"
    label: "PDF password (HDFC only — if the statement PDF is password-protected, for HDFC often the Cust ID)"
    required: false

run_args:
  bank: "{inputs.bank}"
  statement_files: "{inputs.statement_files}"
  gnucash_file: "{inputs.gnucash_file}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"
  pdf_password: "{inputs.pdf_password}"

output:
  extension: ".csv"
  suffix: "GnuCash_import_ready"
  download_label: "Download Import-Ready CSV"

requires:
  native_binaries: []
  external_tools: []

help:
  overview: >
    The one-click, end-to-end importer: upload a raw bank statement and your
    GnuCash book and get back a GnuCash-ready, account-mapped CSV — no
    intermediate steps. It chains bank extraction, conversion to canonical
    format, and account mapping for you. HDFC statements are handled fully
    deterministically (no LLM) across all four input shapes it accepts —
    normal PDF, password-protected PDF, XLS/XLSX exports, and CSV exports —
    including automatic OCR fallback if a PDF's text layer is garbled.
  when_to_use: >
    Use this when your goal is to get transactions into GnuCash. Use the
    individual bank skills (BoB, HDFC, etc.) instead only when you want the
    extracted CSV without account mapping.
  inputs:
    - name: "bank"
      tooltip: "Which bank the statement is from — this picks the right extractor."
      accepts: "One of: ICICI, Bank of Baroda, HSBC, HDFC, Kotak, Other Bank (CSV)."
      gotchas: "Pick 'Other Bank (CSV)' for any bank without a dedicated extractor; columns are normalised with LLM help."
    - name: "statement_files"
      tooltip: "The statement file(s), matching the bank you chose."
      accepts: "XLS for ICICI; PDF(s) for BoB / HSBC / Kotak; CSV or XLS/XLSX for HDFC / Other."
      gotchas: "File type must match the selected bank, or extraction will fail."
    - name: "gnucash_file"
      tooltip: "Your GnuCash book — used to learn your accounts and map transactions."
      accepts: "GnuCash file (.gnucash)."
      gotchas: "Must be closed in GnuCash so the file is not locked. It is read only, never modified."
    - name: "pdf_password"
      tooltip: "Only used for HDFC when the statement PDF itself is password-protected."
      accepts: "The statement's open password — for HDFC this is often the Cust ID."
      gotchas: "Ignored for all other banks and for non-PDF HDFC inputs. Never logged or included in output."
  steps:
    - "Choose the bank."
    - "Upload the matching statement file(s)."
    - "Select your .gnucash book (closed in GnuCash)."
    - "Click Run, then import the resulting CSV via File > Import in GnuCash."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-GnuCash_import_ready.csv"
        tooltip: >
          The statement converted to canonical columns AND mapped to your GnuCash
          accounts (based on your book's history), ready to import directly — no
          manual categorising.
  tips: >
    Account mapping learns from your existing GnuCash history, so the more you
    have categorised before, the better the auto-mapping. Review a few rows after
    import the first time. For HDFC, prefer the plain PDF, XLS/XLSX, or CSV export
    over a password-protected PDF when you have the choice — extraction is
    equally deterministic either way, but if HDFC ever hands you a PDF whose
    text layer is garbled (rare, seen on some re-downloaded statements), the
    skill auto-detects it and falls back to OCR, which is typically ~90%+
    accurate rather than exact; re-check the running/closing balance in that
    case.
  troubleshooting:
    - problem: "Run errors mentioning the endpoint / model."
      fix: "Mapping (and 'Other Bank' normalisation) uses an LLM. Start Ollama or set an endpoint in Settings."
    - problem: "Extraction fails immediately."
      fix: "The file type probably doesn't match the chosen bank (e.g. a PDF selected for ICICI). Re-check both."
    - problem: "Some rows mapped to the wrong account."
      fix: "Fix them in GnuCash after import; future runs learn from the correction."
