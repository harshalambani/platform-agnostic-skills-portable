name: "GnuCash Import"
display_name: "GnuCash Import"
description: >
  Convert bank/financial statements (CSV/XLSX) to GnuCash-importable CSV format.
  Uses deterministic pre-parse + LLM spec-generation + deterministic row transform.
  Handles Indian number formats, Dr/Cr conventions, multi-file batch input.
category: "gnucash"
version: "1.0.0"

mode: "agent"
entry_point: "agent:run"

inputs:
  - name: "statement_files"
    type: "files"
    label: "Statement file(s)"
    file_types: [".csv", ".xlsx", ".xls"]
    required: true

run_args:
  statement_files: "{inputs.statement_files}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

output:
  extension: ".csv"
  suffix: "gnucash-import"
  download_label: "Download CSV"
  type: "file"
