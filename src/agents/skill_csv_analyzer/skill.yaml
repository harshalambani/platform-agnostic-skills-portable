# skill.yaml — CSV Data Analyzer skill manifest
# This file is read by the skill registry (agents/registry.py) at startup.

name: "CSV Analyzer"
display_name: "CSV Data Analyzer"
description: >
  Ask natural-language questions about any CSV file. The LLM inspects
  the data structure, runs pandas operations via tool calls, and returns
  a Markdown answer with cited numbers. Requires a model that supports
  function calling (e.g. llama3.1, qwen3, gemma4 via Ollama).
category: "utilities"
version: "1.0.0"

# Execution mode: "agent" — LangGraph ReAct with tool-calling.
mode: "agent"

# The run() function to call. Relative to this skill's package.
entry_point: "agent:run"

# Input fields rendered in the generic tab. Order matters.
inputs:
  - name: "csv_path"
    type: "file"
    label: "CSV file"
    file_types: [".csv"]
    required: true

  - name: "question"
    type: "text"
    label: "Question about this data (e.g. 'What is the average revenue by region?')"
    required: true

# How the run() function is called. Maps input field names to run() kwargs.
run_args:
  csv_path: "{inputs.csv_path}"
  question: "{inputs.question}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

# Output file configuration.
output:
  extension: ".md"
  suffix: "analysis"
  download_label: "Download Analysis"

# External dependencies beyond pip packages.
requires:
  native_binaries: []
  external_tools: []

help:
  overview: >
    Ask a plain-English question about any CSV and get a written answer with the
    numbers worked out. The agent loads the file, reasons over the rows, and
    returns a short Markdown report.
  when_to_use: >
    Use this for quick, ad-hoc analysis ("average revenue by region?", "which
    month had the most refunds?") without writing spreadsheet formulas. For a
    formatted spreadsheet deliverable, use Excel directly instead.
  inputs:
    - name: "csv_path"
      tooltip: "The CSV file you want to ask about."
      accepts: "CSV (.csv) with a header row."
      gotchas: "A clear header row gives much better answers. Very large files may be sampled."
    - name: "question"
      tooltip: "Your question in plain language."
      accepts: "Free text."
      gotchas: "One focused question per run works best; ask follow-ups as new runs."
  steps:
    - "Pick your CSV file."
    - "Type your question."
    - "Click Run and read (or download) the Markdown answer."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-analysis.md"
        tooltip: "A Markdown write-up answering your question, including the figures the agent computed."
  tips: >
    Treat the answer as a first pass — spot-check any number that drives a
    decision, since the model reasons over the data rather than running fixed formulas.
  troubleshooting:
    - problem: "Run errors mentioning the endpoint / model."
      fix: "This skill needs an LLM. Start Ollama or configure an endpoint in Settings."
    - problem: "Answer seems to ignore part of the data."
      fix: "Large CSVs may be sampled; narrow the file or the question and re-run."
