# skill.yaml — Text Translator skill manifest
# This file is read by the skill registry (agents/registry.py) at startup.

name: "translate"
display_name: "Text Translator"
description: >
  Translate text between languages using any chat-capable LLM.
  Paste or type your text, specify source and target languages,
  and get the translation back. Works with local models via Ollama
  — no cloud API required.
category: "utilities"
version: "1.0.0"

# Execution mode: "direct" — prompt → LLM → response. No tools needed.
mode: "direct"

# The run() function to call. Relative to this skill's package.
entry_point: "agent:run"

# Input fields rendered in the generic tab. Order matters.
inputs:
  - name: "text"
    type: "text"
    label: "Text to translate"
    required: true

  - name: "source_lang"
    type: "select"
    label: "Source language"
    required: false
    options:
      - "auto"
      - "English"
      - "Hindi"
      - "Spanish"
      - "French"
      - "German"
      - "Japanese"
      - "Chinese"
      - "Arabic"
      - "Portuguese"
      - "Russian"

  - name: "target_lang"
    type: "select"
    label: "Target language"
    required: true
    options:
      - "English"
      - "Hindi"
      - "Spanish"
      - "French"
      - "German"
      - "Japanese"
      - "Chinese"
      - "Arabic"
      - "Portuguese"
      - "Russian"

# How the run() function is called. Maps input field names to run() kwargs.
run_args:
  text: "{inputs.text}"
  source_lang: "{inputs.source_lang}"
  target_lang: "{inputs.target_lang}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

# Output file configuration.
output:
  extension: ".txt"
  suffix: "translation"
  download_label: "Download Translation"

# External dependencies beyond pip packages.
requires:
  native_binaries: []
  external_tools: []

help:
  overview: >
    Translates text between languages using your configured LLM, and saves the
    translation as a text file.
  when_to_use: >
    Use this for quick text translation. Pick 'auto' as the source language to
    let the model detect it.
  inputs:
    - name: "text"
      tooltip: "The text you want translated."
      accepts: "Free text."
      gotchas: "Paste the text directly; this translates text, not files."
    - name: "source_lang"
      tooltip: "The language of your text, or 'auto' to detect."
      accepts: "auto, English, Hindi, Spanish, French, German, Japanese, Chinese, Arabic, Portuguese, Russian."
      gotchas: "Leave on 'auto' if unsure."
    - name: "target_lang"
      tooltip: "The language to translate into."
      accepts: "English, Hindi, Spanish, French, German, Japanese, Chinese, Arabic, Portuguese, Russian."
      gotchas: "Required — choose the output language."
  steps:
    - "Paste the text."
    - "Set source (or 'auto') and target language."
    - "Click Run and download the translation."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-translation.txt"
        tooltip: "The translated text in the target language."
  tips: >
    Translation quality depends on the model you have connected — a larger model
    generally handles nuance and less-common languages better.
  troubleshooting:
    - problem: "Run errors mentioning the endpoint / model."
      fix: "This skill needs an LLM. Start Ollama or set an endpoint in Settings."
    - problem: "Output mixes languages or is off."
      fix: "Set the source language explicitly instead of 'auto', or try a larger model."
