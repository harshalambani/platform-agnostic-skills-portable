name: "skill_hdfc"
display_name: "HDFC"
description: >
  Convert HDFC Bank statements to GnuCash-importable CSV.
  Supports scanned PDF (OCR via pypdfium2 + pytesseract) and
  net-banking XLS/XLSX (pure Python, no external tools needed).
  No LLM required.
category: "banks"
version: "1.1.0"

mode: "direct"
entry_point: "agent:run"

inputs:
  - name: "pdf_path"
    type: "file"
    label: "HDFC statement (PDF, XLS, or XLSX)"
    file_types: [".pdf", ".xls", ".xlsx"]
    required: true

run_args:
  pdf_path: "{inputs.pdf_path}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

output:
  extension: ".csv"
  suffix: "HDFC_canonical"
  download_label: "Download CSV"

requires:
  native_binaries: ["tesseract"]   # PDF only; not needed for XLS/XLSX
  python_packages: ["xlrd", "openpyxl", "pypdfium2", "pytesseract"]
  external_tools: []
  llm: false

help:
  overview: >
    Converts HDFC statements — scanned or text PDF, or a net-banking XLS/XLSX —
    into a GnuCash-ready canonical CSV. Scanned PDFs are OCR'd automatically with
    Tesseract; XLS/XLSX and text PDFs skip OCR. Runs offline.
  when_to_use: >
    Use this to get a clean, consistently-columned CSV from any HDFC statement
    format. To also map the rows to GnuCash accounts in one step, use the GnuCash
    Import skill and choose HDFC instead.
  inputs:
    - name: "pdf_path"
      tooltip: "Your HDFC statement — PDF (scanned or text) or the net-banking spreadsheet."
      accepts: "PDF (.pdf), Excel (.xls / .xlsx) — one file."
      gotchas: >
        XLS/XLSX downloads are the most reliable. Scanned PDFs need Tesseract
        (bundled in the frozen build; on PATH for source mode) and OCR quality
        depends on the scan.
  steps:
    - "Pick your HDFC statement file (XLS/XLSX preferred, PDF also works)."
    - "Click Run."
    - "Download the canonical CSV."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-HDFC_canonical.csv"
        tooltip: >
          The statement in canonical columns (date, description, debit/credit,
          balance) — the same shape every bank skill emits, so it feeds straight
          into the GnuCash account-mapping pipeline.
  tips: >
    Prefer the net-banking XLS/XLSX export when you have the choice — it skips
    OCR entirely and is exact.
  troubleshooting:
    - problem: "A scanned PDF produces poor or missing rows."
      fix: "Use the XLS/XLSX export instead, or improve the scan. Ensure Tesseract is available in source mode."
    - problem: "Columns do not look canonical."
      fix: "Confirm the file is a real HDFC statement; other banks have their own skills."
