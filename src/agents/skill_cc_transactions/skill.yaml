# skill.yaml — Credit Card Transactions skill manifest

name: "CC Transactions"
display_name: "Credit Card — Transactions"
description: >
  Scan a folder of organized credit card PDFs (output of the CC Sort skill),
  apply bank-specific parsing rules, and produce a consolidated Excel workbook
  with all transactions plus a summary sheet.
category: "credit_card"
version: "1.0.0"

mode: "direct"
entry_point: "agent:run"

inputs:
  - name: "pdf_dir"
    type: "directory"
    label: "Organized PDFs folder (Decrypted_PDFs_Correct/ from CC Sort)"
    required: true

run_args:
  pdf_dir: "{inputs.pdf_dir}"
  output_excel: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

output:
  extension: ".xlsx"
  suffix: "CC-Transactions"
  download_label: "Download Excel"

requires:
  native_binaries: []
  external_tools: []
  llm: false

help:
  overview: >
    Reads the organised credit-card PDFs from the CC Sort step and extracts every
    transaction table into one consolidated Excel workbook — one row per
    transaction across all cards. Runs fully offline.
  when_to_use: >
    Use this as the second step, right after "CC Sort". It expects the decrypted,
    sorted folder that CC Sort produced, not raw statement files.
  inputs:
    - name: "pdf_dir"
      tooltip: "The Decrypted_PDFs_Correct/ folder created by CC Sort."
      accepts: "A folder of decrypted statement PDFs."
      gotchas: "Choose the Decrypted_PDFs_Correct/ subfolder, not the top-level CC-Sort output folder."
  steps:
    - "Run CC Sort first if you have not already."
    - "Select the Decrypted_PDFs_Correct/ folder."
    - "Click Run and download the Excel."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-CC-Transactions.xlsx"
        tooltip: >
          One consolidated sheet of transactions across all sorted statements,
          with date, description and amount columns extracted from each card's
          table.
  tips: >
    Because the PDFs are already grouped by issuer, the consolidated sheet keeps
    cards together — handy for per-card filtering in Excel.
  troubleshooting:
    - problem: "Few or no transactions extracted."
      fix: "You probably pointed at the wrong folder. Use Decrypted_PDFs_Correct/ from CC Sort."
