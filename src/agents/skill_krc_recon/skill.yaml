# skill.yaml — KR Choksey Bills reconciliation skill manifest (Part II).
# Read by the skill registry (agents/registry.py) at startup.
# Renders as a second "Reconcile" sub-tab under GnuCash > KRChoksey
# (any skill with category "krc" is nested there automatically).

name: "KRC Reconcile"
display_name: "Reconcile"
description: >
  Reconcile KR Choksey contract notes (SLBM confirmation memos + equity trade
  notes) against the Part I Simplified Ledger workbook. Matches each bill to a
  ledger movement by amount, corroborates by settlement number (from the Part I
  References sheet), flags bank pay-in/out as unreconciled pending the GnuCash
  bank import, and flags any settlement movement that has no contract note.
  Produces a workbook with Bills, Trade Lines, and Reconciliation sheets.
category: "krc"
version: "1.2.0"

# Direct mode — deterministic, no LLM. Guarantees the output file is written
# (and therefore the download button appears).
mode: "direct"
entry_point: "agent:run"

inputs:
  - name: "ledger_xlsx"
    type: "output_file"
    label: "Part I Simplified Ledger workbook"
    match: "*-KRC-Ledger.xlsx"
    file_types: [".xlsx"]
    required: true
  - name: "cn_dir"
    type: "files"
    label: "Contract Notes (SLBM memos + trade notes)"
    file_types: [".pdf"]
    required: true
  - name: "password"
    type: "text"
    label: "PDF password (account holder's PAN)"
    required: true

run_args:
  cn_dir: "{inputs.cn_dir}"
  ledger_xlsx: "{inputs.ledger_xlsx}"
  password: "{inputs.password}"
  output_path: "{output_path}"
  config_path: "{config_path}"
  model_override: "{model_override}"

output:
  extension: ".xlsx"
  suffix: "KRC-Bills-Recon"
  download_label: "Download Excel"

requires:
  native_binaries: ["qpdf"]
  external_tools: []
  llm: false

help:
  overview: >
    Part II of the KR Choksey → GnuCash flow. Matches the contract notes (SLBM
    memos and trade notes) against the Part I Simplified Ledger and produces a
    "Bills" workbook. Runs fully offline (deterministic, no LLM).
  when_to_use: >
    Run this second, after "KRChoksey" (Part I). Its Bills workbook is the input
    to "GnuCash Import" (Part III).
  inputs:
    - name: "ledger_xlsx"
      tooltip: "The Part I Simplified Ledger — pick it from the list of prior outputs."
      accepts: "Excel (.xlsx) matching *-KRC-Ledger.xlsx."
      gotchas: "Run Part I first; the picker only lists Ledger workbooks from earlier runs."
    - name: "cn_dir"
      tooltip: "The contract-note PDFs — SLBM memos plus trade notes."
      accepts: "PDF (.pdf) — one or many contract notes."
      gotchas: "Include every contract note for the period so the reconciliation is complete."
    - name: "password"
      tooltip: "The PDF password — the account holder's PAN."
      accepts: "Text — the account holder's PAN."
      gotchas: "Decryption uses qpdf (bundled in the frozen build)."
  steps:
    - "Pick the Part I Simplified Ledger from the dropdown."
    - "Select all the contract-note PDFs."
    - "Enter the PDF password (PAN)."
    - "Click Run and download the Bills workbook."
  outputs:
    folder: "Data/outputs/"
    files:
      - name: "YYYY-MM-DD-HHMMSS-<input>-KRC-Bills-Recon.xlsx"
        tooltip: >
          The reconciled Bills workbook tying contract notes to the ledger. This
          is the file you pick in the GnuCash Import (Part III) tab.
  tips: >
    A complete set of contract notes is what makes Part II tie out — missing
    notes show up as unmatched bills.
  troubleshooting:
    - problem: "Some bills are unmatched."
      fix: "A contract note is probably missing for the period. Add it and re-run."
    - problem: "PDF won't open."
      fix: "Check the PAN password and that qpdf is available in source mode."
